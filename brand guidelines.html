<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Themify Icons -->
  <link rel="stylesheet" href="assets/vendors/themify-icons/css/themify-icons.css">

  <!-- Meyawo main styles -->
  <link rel="stylesheet" href="assets/css/meyawo.css">

  <style>
    .div {
      margin-top: 10%;
    }
    .service-card {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
      transition: transform 0.3s ease;
    }
    .service-card:hover {
      transform: scale(1.05);
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
    }
    .icon {
      display: block;
      margin: auto;
    }
    .title {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container text-center">
    <div class="row g-4"><!-- ROW -->

      <div class="col-md-6 col-lg-3 div">
        <div class="service-card">
          <div class="body">
            <img src="img/photoshop-icon.png" height="200px" width="200px" class="icon">
            <a href="img/photoshop.pdf.pdf">
              <h2 class="title">PHOTOSHOP</h2>
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-6 col-lg-3 div">
        <div class="service-card">
          <div class="body">
            <img src="img/illustrator-icon.png" height="200px" width="200px" class="icon">
            <a href="img/illustrator.pdf.pdf">
              <h2 class="title">ILLUSTRATOR</h2>
            </a>
          </div>
        </div>
      </div>

    </div><!-- END ROW -->
  </div><!-- END CONTAINER -->

</body>
</html>
